const $=id=>document.getElementById(id);
function d0(){let d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function fmt(iso){return new Date(iso).toLocaleString("fi-FI",{weekday:"short",day:"numeric",month:"numeric",hour:"2-digit",minute:"2-digit"})}
function sr(r,s){if(!r)return 0;let p=s==="home"?"home":"away",d=r.details||r;return Number(d[`runs_${p}_first_period`]||0)+Number(d[`runs_${p}_second_period`]||0)}
function add(m,t){let k=t.id;if(!m[k])m[k]={id:t.id,name:t.shorthand||t.name,played:0,for:0,against:0,hp:0,hf:0,ha:0,ap:0,af:0,aa:0,recent:[]};return m[k]}
function stats(ms){let st={};ms.filter(x=>x.result&&x.liveResult&&x.liveResult.finished).forEach(x=>{let h=add(st,x.home),a=add(st,x.away),hr=sr(x.result,"home"),ar=sr(x.result,"away");h.played++;h.for+=hr;h.against+=ar;h.hp++;h.hf+=hr;h.ha+=ar;h.recent.push({date:x.date,for:hr,against:ar});a.played++;a.for+=ar;a.against+=hr;a.ap++;a.af+=ar;a.aa+=hr;a.recent.push({date:x.date,for:ar,against:hr})});Object.values(st).forEach(t=>t.recent.sort((a,b)=>new Date(b.date)-new Date(a.date)));return st}
function ravg(t,f){let r=t.recent.slice(0,5);return r.length?r.reduce((s,x)=>s+x[f],0)/r.length:null}
function avg(a,b,fb){let v=[a,b].filter(x=>Number.isFinite(x)&&x>0);return v.length?v.reduce((s,x)=>s+x,0)/v.length:fb}
function wadj(w){if(!w||w.error)return 0;let a=0,t=+w.temperature,ws=+w.windSpeed,r=+w.precipitation;if(Number.isFinite(t)){if(t>=20)a+=.35;else if(t<=10)a-=.35}if(Number.isFinite(ws)&&ws>=7)a-=.25;if(Number.isFinite(r)&&r>=.5)a-=.35;return a}
function pred(hm,aw,st,w){let h=st[hm.id],a=st[aw.id];if(!h||!a)return{hr:0,ar:0,hp:50,ap:50,note:"Dataa liian vähän."};let l=Object.values(st).reduce((s,t)=>s+t.for,0)/Math.max(1,Object.values(st).reduce((s,t)=>s+t.played,0));let ha=h.hp?h.hf/h.hp:h.for/h.played,hd=h.hp?h.ha/h.hp:h.against/h.played,aa=a.ap?a.af/a.ap:a.for/a.played,ad=a.ap?a.aa/a.ap:a.against/a.played;let hr=avg(ha,ad,l),ar=avg(aa,hd,l);let hrf=ravg(h,"for"),hra=ravg(h,"against"),arf=ravg(a,"for"),ara=ravg(a,"against");if(hrf!==null&&ara!==null)hr=hr*.75+((hrf+ara)/2)*.25;if(arf!==null&&hra!==null)ar=ar*.75+((arf+hra)/2)*.25;hr+=.25;let wa=wadj(w);hr+=wa/2;ar+=wa/2;let hp=Math.max(25,Math.min(75,50+(hr-ar)*6));return{hr,ar,hp,ap:100-hp,note:"Koti/vieras, viimeiset 5, kotietu ja sää."}}
function wt(w){if(!w||w.error)return `<div class=weather>🌦️ Sää: ei saatavilla</div>`;let a=wadj(w),s=a>0?"+":"";return `<div class=weather>🌦️ FMI-sää: ${w.temperature??"–"} °C, tuuli ${w.windSpeed??"–"} m/s, sade ${w.precipitation??"–"} mm/h<br><b>Sääkorjaus:</b> ${s}${a.toFixed(2)} juoksua</div>`}
async function weather(m){let g=m.stadium?.details?.place?.geometry;if(!g?.lat||!g?.lng)return{error:"ei koordinaatteja"};try{let r=await fetch(`/.netlify/functions/weather?lat=${g.lat}&lon=${g.lng}&time=${encodeURIComponent(m.date)}`);return r.ok?await r.json():{error:"säävirhe"}}catch(e){return{error:e.message}}}
function table(st){let ts=Object.values(st).filter(t=>t.played).sort((a,b)=>(b.for/b.played-b.against/b.played)-(a.for/a.played-a.against/a.played));$("power").innerHTML=ts.map(t=>{let f=t.for/t.played,a=t.against/t.played,rf=ravg(t,"for"),ra=ravg(t,"against");return `<tr><td><b>${t.name}</b></td><td>${t.played}</td><td>${f.toFixed(2)}</td><td>${a.toFixed(2)}</td><td>${(f-a).toFixed(2)}</td><td>${rf===null?"–":rf.toFixed(2)}</td><td>${ra===null?"–":ra.toFixed(2)}</td></tr>`}).join("")}
async function render(list,st){if(!list.length){$("matches").innerHTML="<p>Otteluita ei löytynyt.</p>";return}$("matches").innerHTML="<p>Haetaan säätiedot...</p>";let out=[];for(let m of list){let w=await weather(m),p=pred(m.home,m.away,st,w),hf=p.hp>=p.ap,total=p.hr+p.ar,conf=Math.abs(p.hp-50);let tag=conf>=15?"Vahva suosikki":conf>=8?"Pieni suosikki":"Tasainen",cls=conf>=15?"green":conf>=8?"blue":"orange";out.push(`<div class=match><div class=top><div>${fmt(m.date)}</div><div>${m.stadium?.name||""}</div></div><div class=teams><div class=team><div class=name>${m.home.shorthand||m.home.name}</div><div class="pct ${hf?"fav":""}">${p.hp.toFixed(0)} %</div></div><div class=vs>vs</div><div class=team><div class=name>${m.away.shorthand||m.away.name}</div><div class="pct ${!hf?"fav":""}">${p.ap.toFixed(0)} %</div></div></div><div class=runs>Juoksuarvio: ${p.hr.toFixed(1)} – ${p.ar.toFixed(1)}</div><span class="pill ${cls}">${tag}</span><span class="pill blue">Total ${total.toFixed(1)}</span><span class="pill orange">ID ${m.id}</span>${wt(w)}<div class=reason>${p.note}</div></div>`)}$("matches").innerHTML=out.join("")}
async function load(){let [level,series]=$("series").value.split("|"),date=$("date").value||d0();$("status").textContent=`Ladataan ${level} ${series}...`;try{let r=await fetch(`/.netlify/functions/matches?level=${encodeURIComponent(level)}&series=${encodeURIComponent(series)}`);let j=await r.json(),ms=Array.isArray(j.data)?j.data:[],st=stats(ms),day=ms.filter(m=>(m.date||"").slice(0,10)===date);if(!day.length)day=ms.filter(m=>new Date(m.date)>=new Date()&&!m.result).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,8);$("mc").textContent=ms.length;$("tc").textContent=Object.keys(st).length;$("dc").textContent=day.length;table(st);await render(day,st);$("status").textContent=`Päivitetty ${new Date().toLocaleTimeString("fi-FI")}`}catch(e){console.error(e);$("status").textContent="Datan haku epäonnistui. Tarkista Netlify Functions."}}
$("date").value=d0();$("btn").onclick=load;$("series").onchange=load;$("date").onchange=load;load();